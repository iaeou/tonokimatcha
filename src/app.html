<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      // Keep in sync with STORAGE_KEY / DEFAULT_THEME in src/lib/stores/theme.ts.
      try {
        var tonokiTheme = localStorage.getItem('tonoki-theme');
        if (tonokiTheme === 'light' || tonokiTheme === 'dark') {
          document.documentElement.dataset.theme = tonokiTheme;
        }
        document.documentElement.style.colorScheme = document.documentElement.dataset.theme;
      } catch (error) {
        /* storage unavailable: keep the dark default */
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600&family=Noto+Serif+JP:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
